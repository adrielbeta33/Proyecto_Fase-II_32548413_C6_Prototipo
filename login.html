<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Log in - Cafetín Central</title>
    <link rel="stylesheet" href="css/loginstyle.css">

</head>
<body>
    <header>

        <img src="imagenes/logo.png" alt="logo principal">

        <nav>
            <ul>
                <li><a>ACCEDER</a>
                    <ul class="submenu">
                        <li><a href="login.html?rol=persona">Persona</a></li>
                        <li><a href="login.html?rol=admin">Administración</a></li>
                        <li><a href="login.html?rol=caja">Personal de Caja</a></li>
                    </ul>
                </li>
            </ul>
        </nav>

    </header>

    <section class="Sc-1">
        <h1>INICIO DE SESIÓN</h1>
    </section>

<main class="principal-login">
    <div class="caja-login">
        <h2 id="login-title">INICIAR SESIÓN</h2> 
        <form id="loginForm" class="form-vertical">
            <div class="input-group">
                <label for="usuario">USUARIO</label>
                <input type="text" id="usuario" placeholder="Ej: adminRoot" required>
            </div>
        
            <div class="input-group">
                <label for="clave">CONTRASEÑA</label>
                <input type="password" id="clave" placeholder="••••••••" required>
            </div>
        
            <button type="submit" class="btn-entrar">ENTRAR</button>
        </form>
        <p id="mensajeError" class="error-text" style="display: none;">Credenciales incorrectas</p>
    </div>
</main>

<script src="js/login.js"></script>

    <footer>

        <div class="f-1">
            <div>

                <p><b>MAPA DEL SITIO</b></p>
                <nav>
                    <ul>
                        <li><a href="index.html">Inicio</a></li>
                        <li><a href="login.html?rol=persona">Acceso Persona</a></li>
                        <li><a href="login.html?rol=admin">Acceso administración</a></li>
                        <li><a href="login.html?rol=caja">Acceso Personal de caja</a></li>

                    </ul>
                </nav>

            </div>
        </div>
        <div class="f-2">

            <p class="logo"><img src="imagenes/logo ucv.png" alt="LOGO"></p>

        </div>
        <div class="f-3">
            <div>
                <p>Consulta nuestras redes</p>
                <nav>
                    <a href="https://www.facebook.com/"><img src="imagenes/facebook.png" alt="facebook"></a>
                    <a href="https://www.instagram.com"><img src="imagenes/instagram.png" alt="instagram"></a>
                    <a href="https://x.com/"><img src="imagenes/twiter.png" alt="twiter"></a>
                </nav>
            </div>

        </div>

    </footer>

</body>
</html>
